version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: saito-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: saito-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: saito-evolution
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=global-api-key
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379/1
      - REDIS_PREFIX_KEY=evolution
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgres://postgres:postgres@saito-postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - WEBSOCKET_ENABLED=false
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    restart: always

volumes:
  redis_data:
  postgres_data:
  evolution_instances:
  evolution_store:
