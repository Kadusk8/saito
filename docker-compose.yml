
services:
  caddy:
    image: caddy:2-alpine
    container_name: saito-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - evolution-api

  frontend:
    build: ./frontend
    container_name: saito-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - INTERNAL_BACKEND_URL=http://backend:3001
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: saito-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
      - evolution-api

  redis:
    image: redis:7-alpine
    container_name: saito-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: saito-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: saito-evolution
    env_file: .env
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    restart: always

volumes:
  redis_data:
  postgres_data:
  evolution_instances:
  evolution_store:
  caddy_data:
  caddy_config:
