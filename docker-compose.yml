
version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    container_name: saito-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - evolution-api

  frontend:
    build: ./frontend
    container_name: saito-frontend
    restart: unless-stopped
    environment:
      - INTERNAL_BACKEND_URL=http://backend:3001
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: saito-backend
    restart: unless-stopped
    environment:
      - PORT=${PORT:-3001}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EVOLUTION_URL=http://evolution-api:8080
      - EVOLUTION_GLOBAL_KEY=${EVOLUTION_GLOBAL_KEY}
    depends_on:
      - postgres
      - redis
      - evolution-api

  redis:
    image: redis:7-alpine
    container_name: saito-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: saito-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: saito-evolution
    environment:
      - AUTHENTICATION_TYPE=${AUTHENTICATION_TYPE}
      - AUTHENTICATION_API_KEY=${AUTHENTICATION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=${AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES:-true}
      - CACHE_REDIS_ENABLED=${CACHE_REDIS_ENABLED:-true}
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=${CACHE_REDIS_PREFIX_KEY:-evolution}
      - CACHE_REDIS_SAVE_INSTANCES=${CACHE_REDIS_SAVE_INSTANCES:-false}
      - CACHE_LOCAL_ENABLED=${CACHE_LOCAL_ENABLED:-false}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_URI=redis://redis:6379/1
      - REDIS_PREFIX_KEY=${REDIS_PREFIX_KEY:-evolution}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - WEBSOCKET_ENABLED=${WEBSOCKET_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    restart: always

volumes:
  redis_data:
  postgres_data:
  evolution_instances:
  evolution_store:
  caddy_data:
  caddy_config:
